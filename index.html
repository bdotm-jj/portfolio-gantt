<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Gantt — Planned vs. Actual</title>
<style>
  :root{
    --ink:#16263d; --cream:#f4f0e6; --card:#faf7ef; --rule:#d9d2c2;
    --accent:#2e7d46; --muted:#8a8474; --red:#c0433f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);
    font-family:'Iowan Old Style',Georgia,'Times New Roman',serif;}
  .sans{font-family:'Helvetica Neue',Arial,sans-serif;}
  #app{padding:28px 26px;}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:6px;}
  h1{font-size:46px;font-style:italic;font-weight:500;margin:0;line-height:1;}
  h2.sec{font-size:30px;font-style:italic;font-weight:500;margin:0;}
  select{font-size:13px;padding:5px 10px;border:0.5px solid var(--ink);background:var(--card);
    color:var(--ink);border-radius:2px;font-family:'Helvetica Neue',Arial,sans-serif;}
  .lobbar{display:flex;align-items:baseline;justify-content:space-between;background:var(--ink);
    color:var(--cream);padding:9px 14px;border-radius:3px;margin:18px 0 2px;cursor:pointer;}
  .lobbar .t{font-style:italic;font-size:18px;}
  .lobbar .m{font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.8;font-family:'Helvetica Neue',Arial,sans-serif;}
  .dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:9px;vertical-align:middle;}
  .podhead{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);
    padding:9px 4px 3px;border-bottom:0.5px solid var(--rule);font-family:'Helvetica Neue',Arial,sans-serif;}
  .row{display:flex;align-items:center;height:46px;border-bottom:0.5px solid #e8e1d0;}
  .row:hover{background:rgba(22,38,61,0.04);}
  .rowlabel{width:250px;padding-right:10px;flex-shrink:0;font-size:13px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px;}
  .track{position:relative;flex:1;height:100%;}
  .badge{flex-shrink:0;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:500;font-family:'Helvetica Neue',Arial,sans-serif;}
  .statustag{font-size:8.5px;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);
    border:0.5px solid #b4ad9a;border-radius:2px;padding:0 4px;flex-shrink:0;font-family:'Helvetica Neue',Arial,sans-serif;}
  .axis{position:relative;display:flex;font-size:10.5px;color:var(--muted);border-bottom:0.5px solid var(--rule);
    height:20px;margin-left:250px;font-family:'Helvetica Neue',Arial,sans-serif;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .cardhdr{color:var(--cream);padding:8px 12px;display:flex;align-items:baseline;justify-content:space-between;}
  .cardhdr .t{font-style:italic;font-size:15px;}
  .cardhdr .m{font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;opacity:0.85;font-family:'Helvetica Neue',Arial,sans-serif;}
  .qcard{background:var(--card);border:0.5px solid var(--rule);border-radius:8px;overflow:hidden;}
  .qitem{display:flex;align-items:center;gap:9px;padding:5px 12px;border-bottom:0.5px solid #ede7d8;}
  .qnum{flex-shrink:0;width:19px;height:19px;border-radius:50%;font-size:10.5px;display:inline-flex;
    align-items:center;justify-content:center;font-family:'Helvetica Neue',Arial,sans-serif;}
  .qname{flex:1;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .qstage{flex-shrink:0;font-size:9.5px;letter-spacing:0.03em;text-transform:uppercase;color:var(--muted);font-family:'Helvetica Neue',Arial,sans-serif;}
  .banner{background:#fbf1d8;border:0.5px solid #d8b24a;border-radius:4px;padding:10px 14px;margin:6px 0 14px;
    font-size:12.5px;color:#6b5410;font-family:'Helvetica Neue',Arial,sans-serif;}
  footer{margin-top:22px;padding-top:10px;border-top:0.5px solid var(--rule);font-size:11px;color:var(--muted);
    display:flex;justify-content:space-between;font-family:'Helvetica Neue',Arial,sans-serif;}
  .sechdr{border-bottom:2px solid var(--ink);padding-bottom:8px;margin:34px 0 14px;display:flex;align-items:baseline;justify-content:space-between;}
  .sechdr .m{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#6b6656;font-family:'Helvetica Neue',Arial,sans-serif;}
  .tabbar{display:flex;gap:4px;border-bottom:2px solid var(--ink);margin-bottom:18px;}
  .tab{font:inherit;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;background:transparent;border:0.5px solid var(--rule);border-bottom:none;color:var(--muted);padding:9px 18px;border-radius:6px 6px 0 0;cursor:pointer;position:relative;top:2px;}
  .tab.on{background:var(--ink);color:var(--cream);border-color:var(--ink);top:0;padding-bottom:11px;}
  .lane{display:flex;align-items:stretch;border-bottom:0.5px solid #e8e1d0;min-height:60px;}
  .lanelabel{width:190px;flex-shrink:0;padding:8px 10px 8px 0;display:flex;flex-direction:column;justify-content:center;}
  .lanename{font-size:13px;color:var(--ink);}
  .lanesub{font-size:10.5px;color:var(--muted);font-family:'Helvetica Neue',Arial,sans-serif;}
  .lanetrack{position:relative;flex:1;overflow:hidden;}
  .pager{display:inline-flex;align-items:center;gap:6px;}
  .pager .btn{padding:5px 9px;}
  .winlabel{font-family:'Helvetica Neue',Arial,sans-serif;font-size:11.5px;color:var(--ink);min-width:118px;text-align:center;letter-spacing:0.03em;}
  .fbar{position:absolute;height:22px;border-radius:5px;cursor:grab;display:flex;align-items:center;padding:0 8px;font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;font-family:'Helvetica Neue',Arial,sans-serif;user-select:none;z-index:2;}
  .fbar.dragging{z-index:30;box-shadow:0 6px 16px rgba(0,0,0,0.35);cursor:grabbing;}
  .fbar.nudged{transition:left 0.12s ease;}
  .fbar:active{cursor:grabbing;}
  .fbar .grip{position:absolute;right:0;top:0;bottom:0;width:9px;cursor:ew-resize;background:rgba(255,255,255,0.35);border-radius:0 5px 5px 0;}
  .impact{position:fixed;right:20px;top:20px;width:340px;background:var(--card);border:1px solid var(--ink);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,0.25);padding:16px 18px;z-index:50;font-family:'Helvetica Neue',Arial,sans-serif;}
  .impact h4{margin:0 0 4px;font-size:14px;color:var(--ink);font-family:'Iowan Old Style',Georgia,serif;font-style:italic;}
  .impact .close{position:absolute;right:12px;top:10px;cursor:pointer;color:var(--muted);border:none;background:none;font-size:16px;}
  .impact ul{list-style:none;margin:10px 0 0;padding:0;}
  .impact li{padding:7px 0;border-top:0.5px solid #e8e1d0;font-size:12.5px;display:flex;gap:8px;align-items:flex-start;}
  .sev{flex-shrink:0;width:9px;height:9px;border-radius:50%;margin-top:4px;}
  .btn{font:inherit;font-size:12px;font-family:'Helvetica Neue',Arial,sans-serif;background:transparent;border:0.5px solid var(--ink);color:var(--ink);padding:5px 12px;border-radius:4px;cursor:pointer;}
  .zoomgrp{display:inline-flex;gap:0;}
  .zoomgrp .zoombtn{border-radius:0;border-left-width:0;}
  .zoomgrp .zoombtn:first-child{border-radius:4px 0 0 4px;border-left-width:0.5px;}
  .zoomgrp .zoombtn:last-child{border-radius:0 4px 4px 0;}
  .zoomgrp .zoombtn.on{background:var(--ink);color:var(--cream);}
</style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script src="rm-data.js" onerror="window.RM_DATA=window.RM_DATA||null"></script>
<script>
"use strict";
if (typeof SNAPSHOT === "undefined") {
  document.getElementById("app").innerHTML = "<p style=\"font-family:Arial;padding:40px;color:#a32d2d\">data.js did not load. Make sure data.js sits next to index.html.</p>";
  throw new Error("data.js not loaded");
}

var LOB_COLOR = {
  "Personal Lines":"#2a78d6","Commercial Lines":"#1f7a3d","Flood":"#c0397a",
  "Motion - HVH":"#7a5cd0","Motion - Condos":"#c85a2a","Motion - Flood":"#5a86c0",
  "Data Reporting Team":"#b87500","Support/Specialty":"#0f8a6d","Tech Initiative":"#c0433f",
  "Program":"#8a6d1f","JJOA":"#4a6b8a","Other":"#7a786f"
};
var INK="#16263d", CREAM="#f4f0e6", CARD="#faf7ef", ACCENT="#2e7d46";
var PARKED = {"On Hold":1,"Not Started":1,"":1};
var EXCLUDE_STAGE = {"Done":1,"Backlog":1,"13 - Done":1};

function pd(v){ if(!v||typeof v!=="string") return null; var d=new Date(v+"T00:00:00"); return isNaN(d.getTime())?null:d; }
function colorFor(l){ return LOB_COLOR[l]||LOB_COLOR.Other; }
function fmt(d){ return d.toLocaleDateString(); }
function days(a,b){ return Math.round((b-a)/86400000); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function shade(hex,amt){ var n=parseInt(hex.slice(1),16);
  var r=Math.min(255,Math.max(0,((n>>16)&255)+amt)), g=Math.min(255,Math.max(0,((n>>8)&255)+amt)), b=Math.min(255,Math.max(0,(n&255)+amt));
  return "rgb("+r+","+g+","+b+")"; }
function bar3d(base){ return "background-image:linear-gradient(to bottom,"+shade(base,48)+" 0%,"+base+" 52%,"+shade(base,-38)+" 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,0.55),inset 0 -2px 3px rgba(0,0,0,0.22),0 1.5px 2.5px rgba(0,0,0,0.28);"; }

var projects = SNAPSHOT.map(function(r){
  var status=r[3]||"", planEnd=pd(r[6]);
  var gaps=[]; if(!pd(r[5])) gaps.push("planned start"); if(!planEnd) gaps.push("planned end");
  return { name:r[0], pod:r[1], lob:r[2]||"Other", status:status||"\u2014", stage:r[4],
    planStart:pd(r[5]), planEnd:planEnd, actStart:pd(r[7]), actEnd:pd(r[8]), rawPlanEnd:r[6],
    manualOrder:(r[9]==null?null:Number(r[9])), code:(r[10]!=null?String(r[10]).replace(/\.0$/,""):null),
    gaps:gaps, parked:!!PARKED[status] };
});
var active = projects.filter(function(p){ return !EXCLUDE_STAGE[p.stage] && p.status!=="Closed"; });

var filter="__all";
var collapsed={};
var activeTab="planactual";   // "planactual" | "forward"

// ---- RM resource layer (optional; forward tab uses it) ----
var RM = (typeof window!=="undefined" && window.RM_DATA) ? window.RM_DATA : null;
// index RM projects by normalized code so we can join to SNAPSHOT (which carries JJ codes via manualOrder join)
function normCode(c){ return c==null?null:String(c).replace(/\.0$/,""); }
var rmByCode={};
if(RM && RM.projects){ RM.projects.forEach(function(p){ var c=normCode(p.code); if(c) rmByCode[c]=p; }); }

function cmpOrder(a,b){ var oa=a.manualOrder==null?Infinity:a.manualOrder, ob=b.manualOrder==null?Infinity:b.manualOrder;
  if(oa!==ob) return oa-ob; return (a.planStart||0)-(b.planStart||0); }

// ---- top-level render: tab bar + dispatch ----
function render(){
  var tabs='<div class="tabbar sans">'
    + '<button class="tab'+(activeTab==="planactual"?" on":"")+'" data-tab="planactual">Plan vs. Actual</button>'
    + '<button class="tab'+(activeTab==="forward"?" on":"")+'" data-tab="forward">Forward Sequence</button>'
    + '</div>';
  var body = activeTab==="planactual" ? renderPlanActual() : renderForward();
  document.getElementById('app').innerHTML = tabs + body;
}

function renderPlanActual(){
  var rows = filter==="__all" ? active : active.filter(function(p){return p.lob===filter;});
  var lobs = Array.from(new Set(active.map(function(p){return p.lob;}))).sort();

  // domain: floor at 2026-01-01
  var FLOOR=new Date(2026,0,1);
  var all=[]; rows.forEach(function(p){[p.planStart,p.planEnd,p.actStart,p.actEnd].forEach(function(d){if(d)all.push(d);});});
  var maxD = all.length ? new Date(Math.max.apply(null,all.map(function(d){return +d;}))) : new Date(2026,11,31);
  var start=FLOOR, pad=(maxD-start)*0.03, end=new Date(+maxD+pad), span=end-start;
  function pct(d){ if(!d) return null; return Math.max(0,((d-start)/span)*100); }
  var stepM = span>400*86400000*2.2 ? 2 : 1;
  var ticks=[], cur=new Date(start.getFullYear(),start.getMonth(),1);
  while(cur<end){ ticks.push(new Date(cur)); cur=new Date(cur.getFullYear(),cur.getMonth()+stepM,1); }
  var today=new Date(), todayP=pct(today);

  // group lob -> pod
  var byLob={}; rows.forEach(function(p){ (byLob[p.lob]=byLob[p.lob]||{}); (byLob[p.lob][p.pod]=byLob[p.lob][p.pod]||[]).push(p); });
  var lobOrder=Object.keys(byLob).sort(function(a,b){ return Object.values(byLob[b]).flat().length-Object.values(byLob[a]).flat().length || a.localeCompare(b); });

  var LABEL_W=250;
  var h="";
  // header
  h+='<header><div class="sans" style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#6b6656;display:flex;justify-content:space-between;"><span>J&amp;J DIT — Development Portfolio</span><span>Planned vs. actual · ordered by priority list</span></div>';
  h+='<div style="display:flex;align-items:flex-end;justify-content:space-between;margin-top:8px;"><h1>The Timeline<span style="color:'+ACCENT+'">.</span></h1>';
  h+='<div class="sans" style="text-align:right;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#6b6656;"><div style="font-size:26px;font-family:Georgia,serif;text-transform:none;color:'+INK+'">'+active.length+'</div>active projects</div></div></header>';

  // controls
  h+='<div class="sans" style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin:14px 0;font-size:12px;color:#4a463c;">';
  h+='<select id="lob"><option value="__all">All lines of business</option>'+lobs.map(function(l){return '<option value="'+esc(l)+'"'+(l===filter?' selected':'')+'>'+esc(l)+'</option>';}).join('')+'</select>';
  h+='<span style="display:inline-flex;gap:16px;flex-wrap:wrap;align-items:center;">'
    +'<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:16px;height:8px;border:1.5px solid #6b6656;border-radius:2px;display:inline-block;"></span>planned</span>'
    +'<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:16px;height:8px;background:#2a78d6;border-radius:2px;display:inline-block;"></span>actual</span>'
    +'<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:16px;height:8px;background:'+INK.replace(INK,"#c0433f")+';border-radius:2px;display:inline-block;"></span>past planned end</span>'
    +'<span style="display:inline-flex;align-items:center;gap:6px;"><span style="width:16px;height:8px;background:#b4ad9a;border-radius:2px;display:inline-block;opacity:0.6;"></span>on hold / not started</span>'
    +'</span></div>';

  // gap banner
  var gapRows=active.filter(function(p){return p.gaps.length>0;});
  if(gapRows.length){
    h+='<div class="banner"><strong>'+gapRows.length+' project'+(gapRows.length>1?'s':'')+' can\u2019t render fully — missing or invalid planned dates:</strong><ul style="margin:6px 0 0;padding-left:18px;">';
    gapRows.forEach(function(p){ h+='<li style="margin-bottom:2px;">'+esc(p.name)+' <span style="color:#8a7020;">('+(p.gaps.length?'no '+p.gaps.join(' / '):'check dates')+(p.rawPlanEnd&&!p.planEnd?' — planned end reads \u201c'+esc(p.rawPlanEnd)+'\u201d':'')+')</span></li>'; });
    h+='</ul><div style="margin-top:6px;font-style:italic;color:#8a7020;">PJMs: fix at source and this clears on next refresh.</div></div>';
  }

  // axis
  h+='<div class="axis">'+ticks.map(function(t){return '<span style="position:absolute;left:'+pct(t)+'%;">'+t.toLocaleDateString(undefined,{month:'short',year:'2-digit'})+'</span>';}).join('')+'</div>';

  // chart
  h+='<div style="position:relative;">';
  if(todayP>=0&&todayP<=100){ h+='<div style="position:absolute;top:0;bottom:0;left:calc('+LABEL_W+'px + '+todayP+'% * (100% - '+LABEL_W+'px) / 100%);width:1px;background:#c0433f;opacity:0.5;z-index:1;"></div>'; }

  lobOrder.forEach(function(lob){
    var pods=byLob[lob], total=Object.values(pods).flat().length, isC=collapsed[lob], color=colorFor(lob);
    h+='<div class="lobbar" data-lob="'+esc(lob)+'"><span class="t"><span class="dot" style="background:'+color+'"></span>'+esc(lob)+'</span><span class="m">'+total+' project'+(total>1?'s':'')+' · '+(isC?'show':'hide')+'</span></div>';
    if(!isC){
      Object.keys(pods).sort().forEach(function(pod){
        h+='<div class="podhead">'+esc(pod)+' <span style="color:#b4ad9a;">('+pods[pod].length+')</span></div>';
        pods[pod].slice().sort(cmpOrder).forEach(function(p){
          var psP=pct(p.planStart),peP=pct(p.planEnd),asP=pct(p.actStart),aeP=pct(p.actEnd);
          var hasPlan=psP!=null&&peP!=null, hasAct=asP!=null&&aeP!=null;
          var over=hasAct&&p.planEnd&&p.actEnd>p.planEnd;
          var splitP=over?Math.max(pct(p.planEnd),asP):null, overD=over?days(p.planEnd,p.actEnd):0;
          var fill=p.parked?"#b4ad9a":color, badge=p.manualOrder;
          var badgeStyle = badge==null ? "background:transparent;border:1px dashed #c4bda8;color:#c4bda8;"
            : (badge===0 ? "background:"+color+";color:#fff;border:none;" : "background:"+CARD+";color:"+INK+";border:1px solid "+INK+";");
          var statusLabel = (p.status&&p.status!=="\u2014")?p.status:"Not Started";

          h+='<div class="row"><div class="rowlabel" title="'+esc(p.name)+'">';
          h+='<span class="badge" style="'+badgeStyle+'" title="'+(badge==null?'Unranked':'Manual ordering: '+badge)+'">'+(badge==null?'\u2013':badge)+'</span>';
          if(p.parked){ h+='<span class="statustag">'+esc(statusLabel)+'</span>'; }
          h+='<span style="overflow:hidden;text-overflow:ellipsis;">'+esc(p.name)+'</span></div>';
          h+='<div class="track">';
          if(hasPlan){ h+='<div title="Planned: '+fmt(p.planStart)+' \u2013 '+fmt(p.planEnd)+'" style="position:absolute;left:'+psP+'%;width:'+Math.max(peP-psP,0.4)+'%;top:7px;height:12px;border:1.5px solid '+(p.parked?'#b4ad9a':'#6b6656')+';border-radius:3px;background-image:linear-gradient(to bottom,rgba(0,0,0,0.06),rgba(255,255,255,0.35));box-shadow:inset 0 1px 2px rgba(0,0,0,0.15),0 0.5px 0 rgba(255,255,255,0.6);"></div>'; }
          if(hasAct&&!over){
            if(p.parked){ h+='<div title="Actual: '+fmt(p.actStart)+' \u2013 '+fmt(p.actEnd)+' · '+esc(statusLabel)+'" style="position:absolute;left:'+asP+'%;width:'+Math.max(aeP-asP,0.4)+'%;top:23px;height:16px;border-radius:5px;opacity:0.7;background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,0.55) 4px,rgba(255,255,255,0.55) 8px),linear-gradient(to bottom,'+shade(fill,40)+','+fill+' 55%,'+shade(fill,-30)+');box-shadow:inset 0 1px 0 rgba(255,255,255,0.4),0 1px 2px rgba(0,0,0,0.18);"></div>'; }
            else { h+='<div title="Actual: '+fmt(p.actStart)+' \u2013 '+fmt(p.actEnd)+'" style="position:absolute;left:'+asP+'%;width:'+Math.max(aeP-asP,0.4)+'%;top:23px;height:16px;border-radius:5px;'+bar3d(fill)+'"></div>'; }
          }
          if(hasAct&&over){
            h+='<div title="Actual to planned end: '+fmt(p.actStart)+' \u2013 '+fmt(p.planEnd)+'" style="position:absolute;left:'+asP+'%;width:'+Math.max(splitP-asP,0.4)+'%;top:23px;height:16px;border-radius:5px 0 0 5px;'+bar3d(fill)+'"></div>';
            h+='<div title="Overrun: past planned end by '+overD+' days (\u2192 '+fmt(p.actEnd)+')" style="position:absolute;left:'+splitP+'%;width:'+Math.max(aeP-splitP,0.4)+'%;top:23px;height:16px;border-radius:0 5px 5px 0;'+bar3d("#c0433f")+'"></div>';
          }
          h+='</div></div>';
        });
      });
    }
  });
  h+='</div>';

  // footer
  h+='<footer><span>Badge = manual ordering (0 = in flight, 1+ = queue) · outline = planned · fill = actual · red = past planned end</span><span>'+(window.LAST_REFRESH?('Data refreshed '+new Date(window.LAST_REFRESH).toLocaleString()):'Excludes closed / done / backlog')+'</span></footer>';

  // ON DECK
  h+=queuePanel();
  // BACKLOG
  h+=backlogPanel();

  return h;
}

function queuePanel(){
  var lobs=Array.from(new Set(QUEUE.map(function(q){return q[1];})));
  var inFlight={}; active.forEach(function(p){ if(p.manualOrder===0) inFlight[p.lob]=(inFlight[p.lob]||0)+1; });
  var byLob={}; QUEUE.forEach(function(q){ (byLob[q[1]]=byLob[q[1]]||[]).push({name:q[0],order:q[2],stage:q[3]}); });
  var order=lobs.sort(function(a,b){ return byLob[b].length-byLob[a].length || a.localeCompare(b); });
  var h='<section><div class="sechdr"><h2 class="sec">On Deck<span style="color:'+ACCENT+'">.</span></h2><span class="m">Forward queue by line of business · manual ordering</span></div><div class="grid">';
  order.forEach(function(lob){
    var color=colorFor(lob), items=byLob[lob].sort(function(a,b){return a.order-b.order;});
    h+='<div class="qcard"><div class="cardhdr" style="background:'+INK+'"><span class="t"><span class="dot" style="width:8px;height:8px;background:'+color+'"></span>'+esc(lob)+'</span><span class="m">'+(inFlight[lob]?inFlight[lob]+' in flight · ':'')+items.length+' queued</span></div><ol style="list-style:none;margin:0;padding:4px 0;">';
    items.forEach(function(it){ h+='<li class="qitem"><span class="qnum" style="background:'+CREAM+';border:1px solid '+INK+';color:'+INK+'">'+it.order+'</span><span class="qname" title="'+esc(it.name)+'">'+esc(it.name)+'</span><span class="qstage">'+esc(it.stage)+'</span></li>'; });
    h+='</ol></div>';
  });

function backlogPanel(){
  var acc={}; active.forEach(function(p){acc[p.name]=1;}); QUEUE.forEach(function(q){acc[q[0]]=1;});
  var byLob={};
  BACKLOG.forEach(function(b){ var name=b[0],lob=b[1],ord=b[2]; byLob[lob]=byLob[lob]||{shown:[],queued:0};
    if(acc[name]) byLob[lob].queued++; else byLob[lob].shown.push({name:name,order:ord}); });
  var withItems=Object.keys(byLob).filter(function(l){return byLob[l].shown.length>0;});
  var total=withItems.reduce(function(s,l){return s+byLob[l].shown.length;},0);

  var h='<section><div class="sechdr"><h2 class="sec">Backlog<span style="color:'+ACCENT+'">.</span></h2><span class="m">'+total+' not shown above · neither dated nor queued</span></div><div class="grid">';
  order.forEach(function(lob){
    var color=colorFor(lob), o=byLob[lob];

    o.shown.forEach(function(it){ h+='<li class="qitem"><span class="qnum" style="background:transparent;border:1px dashed #b4ad9a;color:#a49d88;">'+(it.order==null?'\u2013':it.order)+'</span><span class="qname" style="color:#5a564c;" title="'+esc(it.name)+'">'+esc(it.name)+'</span></li>'; });
    h+='</ul>';
    if(o.queued>0){ h+='<div class="sans" style="padding:6px 12px;font-size:10.5px;color:#8a8474;font-style:italic;border-top:0.5px solid #ede7d8;">+'+o.queued+' more backlog item'+(o.queued>1?'s':'')+' already queued in On Deck above</div>'; }
    h+='</div>';
  });
  return h+'</div></section>';
}

// ============================ FORWARD SEQUENCE TAB ============================
// Lanes = pods (default) or people (drill-down). Projects chain in manual-ordering
// order, positioned on the calendar from RM task date ranges. Dragging a project's
// grip extends it; everything sequenced after it in the same lane slides right.
// On release, a popup names what's now in jeopardy relative to TODAY.

var fwdMode = "pod";        // "pod" | "person"
var fwdPodFilter = "__all"; // when in person mode, which pod's people to show
var fwdOverrides = {};      // code -> extra days added by dragging the edge (resize)
var fwdPins = {};           // code -> pinned start Date (manual move); cascade flows around it
var zoom = "month";         // "month" | "quarter" | "year"
var fwdWinStart = null;      // Date: left edge of the visible window (null = auto/default)

function rmRange(code){
  var r = rmByCode[normCode(code)];
  if(!r) return null;
  var ds=[]; (r.tasks||[]).forEach(function(t){ if(t.starts_at) ds.push(new Date(t.starts_at+"T00:00:00")); if(t.ends_at) ds.push(new Date(t.ends_at+"T00:00:00")); });
  if(r.rmStart) ds.push(new Date(r.rmStart+"T00:00:00"));
  if(r.rmEnd) ds.push(new Date(r.rmEnd+"T00:00:00"));
  ds=ds.filter(function(d){return !isNaN(d);});
  if(!ds.length) return null;
  return { start:new Date(Math.min.apply(null,ds)), end:new Date(Math.max.apply(null,ds)) };
}

// Build lane model: for each active project that has RM data, its base range + people.
// Join on stable code first (SNAPSHOT now carries it), then fall back to name.
function buildFwd(){
  var items=[], missing=[];
  active.forEach(function(p){
    var code=null, rm=null;
    if(p.code && rmByCode[normCode(p.code)]){ code=normCode(p.code); rm=rmByCode[code]; }
    if(!rm){ for(var c in rmByCode){ if(rmByCode[c].rmName===p.name){ rm=rmByCode[c]; code=c; break; } } }
    if(!rm){ var pn=p.name.toLowerCase(); for(var c2 in rmByCode){ if((rmByCode[c2].rmName||"").toLowerCase()===pn){ rm=rmByCode[c2]; code=c2; break; } } }
    if(!rm){ missing.push(p.name); return; }
    var rng=rmRange(code);
    if(!rng){ missing.push(p.name); return; }
    items.push({ name:p.name, pod:p.pod, lob:p.lob, code:code, order:p.manualOrder,
      baseStart:rng.start, baseEnd:rng.end, people:rm.people||[], status:p.status });
  });
  return { items:items, missing:missing };
}

// Apply cascade within each lane. Projects sort by manual order and chain so each starts
// no earlier than the prior ends. A PINNED project (manually moved) locks to its pinned
// start; unpinned projects flow around it. Edge-resize overrides lengthen a bar.
function cascade(items, laneKeyFn){
  var lanes={};
  items.forEach(function(it){ var k=laneKeyFn(it); (lanes[k]=lanes[k]||[]).push(it); });
  var out={};
  Object.keys(lanes).forEach(function(k){
    var arr=lanes[k].slice().sort(cmpOrder);
    var cursor=null; var placed=[];
    arr.forEach(function(it){
      var dur = (it.baseEnd - it.baseStart) + (fwdOverrides[it.code]||0)*86400000;
      var pinned = fwdPins[it.code] ? new Date(+fwdPins[it.code]) : null;
      var start;
      if(pinned){ start = pinned; }                 // locked where the user put it
      else { start = new Date(+it.baseStart); if(cursor && start < cursor) start = new Date(+cursor); }
      var end = new Date(+start + dur);
      placed.push({ ref:it, start:start, end:end, pinned:!!pinned });
      // cursor advances to the later of current end / existing cursor (pins can sit anywhere)
      cursor = cursor ? new Date(Math.max(+cursor, +end)) : new Date(+end);
    });
    out[k]=placed;
  });
  return out;
}

// Zoom defines a WINDOW (visible slice), its tick granularity, and how far ◀▶ pages.
function zoomConfig(){
  if(zoom==="year")    return { windowMonths:0,  stepMonths:12, tickFmt:{year:'numeric'},               pageMonths:12, weekTicks:false }; // 0 = full span
  if(zoom==="quarter") return { windowMonths:3,  stepMonths:1,  tickFmt:{month:'short',year:'2-digit'}, pageMonths:3,  weekTicks:false };
  return                      { windowMonths:2,  stepMonths:1,  tickFmt:{month:'short',day:'numeric'},  pageMonths:1,  weekTicks:true };
}
function addMonths(d,n){ return new Date(d.getFullYear(), d.getMonth()+n, d.getDate()); }
function monthFloor(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }

function renderForward(){
  if(!RM){ return '<div class="sans" style="padding:40px;color:#8a8474;">Forward Sequence needs <code>rm-data.js</code> (the Resource Management layer). Run the RM extract workflow, then reload.</div>'; }
  var model=buildFwd();
  var laneKeyFn = fwdMode==="pod" ? function(it){return it.pod||"Other";} : function(it){ return it.people[0]||"Unassigned"; };
  var itemsForMode = model.items;
  if(fwdMode==="person" && fwdPodFilter!=="__all"){ itemsForMode = model.items.filter(function(it){return (it.pod||"Other")===fwdPodFilter;}); }
  if(fwdMode==="person"){
    var exp=[]; itemsForMode.forEach(function(it){ (it.people.length?it.people:["Unassigned"]).forEach(function(pn){ exp.push(Object.assign({},it,{_person:pn})); }); });
    itemsForMode=exp; laneKeyFn=function(it){return it._person;};
  }
  var placedByLane = cascade(itemsForMode, laneKeyFn);

  var FLOOR=new Date(2026,0,1);
  var all=[]; Object.keys(placedByLane).forEach(function(k){ placedByLane[k].forEach(function(pl){ all.push(pl.start,pl.end); }); });
  var dataMin = all.length? new Date(Math.min.apply(null,all.map(function(d){return +d;}))) : FLOOR;
  var dataMax = all.length? new Date(Math.max.apply(null,all.map(function(d){return +d;}))) : new Date(2026,11,31);
  var zc=zoomConfig();
  var today=new Date(); today.setHours(0,0,0,0);

  var start, end;
  if(zc.windowMonths===0){
    start = FLOOR;
    end = addMonths(monthFloor(dataMax), 12);
  } else {
    if(!fwdWinStart){ fwdWinStart = monthFloor(today < dataMin ? dataMin : today); }
    start = monthFloor(fwdWinStart);
    end = addMonths(start, zc.windowMonths);
  }
  var span=Math.max(end-start,1);
  function pct(d){ return ((d-start)/span)*100; }
  function clip(v){ return Math.max(0,Math.min(100,v)); }

  var ticks=[];
  if(zc.weekTicks){
    var c=new Date(start); while(c<end){ ticks.push(new Date(c)); c=new Date(+c+7*86400000); }
  } else {
    var cur=monthFloor(start); while(cur<end){ ticks.push(new Date(cur)); cur=addMonths(cur,zc.stepMonths); }
  }
  var todayP=pct(today);
  var LABEL_W=190;

  var h='';
  h+='<div class="sechdr"><h2 class="sec">Forward Sequence<span style="color:'+ACCENT+'">.</span></h2><span class="m">Drag a bar to move it (pins) · drag its edge to resize</span></div>';
  h+='<div class="sans" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:0 0 14px;font-size:12px;color:#4a463c;">';
  h+='<button class="btn" id="fwdModeBtn">View: '+(fwdMode==="pod"?"Pods":"People")+' \u21c4</button>';
  h+='<span class="zoomgrp">'
    + '<button class="btn zoombtn'+(zoom==="month"?" on":"")+'" data-zoom="month">Month</button>'
    + '<button class="btn zoombtn'+(zoom==="quarter"?" on":"")+'" data-zoom="quarter">Quarter</button>'
    + '<button class="btn zoombtn'+(zoom==="year"?" on":"")+'" data-zoom="year">Year</button>'
    + '</span>';
  if(zc.windowMonths!==0){
    var winLabel = start.toLocaleDateString(undefined,{month:'short',year:'2-digit'}) + ' \u2013 ' + addMonths(start,zc.windowMonths-1).toLocaleDateString(undefined,{month:'short',year:'2-digit'});
    h+='<span class="pager"><button class="btn" id="fwdPrev">\u25c0</button><span class="winlabel">'+winLabel+'</span><button class="btn" id="fwdNext">\u25b6</button><button class="btn" id="fwdNow">Today</button></span>';
  }
  if(fwdMode==="person"){
    var pods=Array.from(new Set(model.items.map(function(it){return it.pod||"Other";}))).sort();
    h+='<select id="fwdPod"><option value="__all">All pods\u2019 people</option>'+pods.map(function(p){return '<option value="'+esc(p)+'"'+(p===fwdPodFilter?' selected':'')+'>'+esc(p)+'</option>';}).join('')+'</select>';
  }
  if(Object.keys(fwdOverrides).length || Object.keys(fwdPins).length){ h+='<button class="btn" id="fwdReset">Reset simulation</button>'; }
  h+='<span style="color:#8a8474;">Chained by manual order · red line = today · \u{1F4CC} = pinned</span>';
  h+='</div>';

  h+='<div class="axis" style="margin-left:'+LABEL_W+'px;">'+ticks.map(function(t){var p=pct(t); if(p<0||p>100)return ''; return '<span style="position:absolute;left:'+p+'%;">'+t.toLocaleDateString(undefined,zc.tickFmt)+'</span>';}).join('')+'</div>';

  h+='<div style="position:relative;">';
  if(todayP>=0&&todayP<=100){ h+='<div style="position:absolute;top:0;bottom:0;left:calc('+LABEL_W+'px + '+todayP+'% * (100% - '+LABEL_W+'px) / 100%);width:1px;background:#c0433f;opacity:0.55;z-index:1;"></div>'; }

  var laneKeys=Object.keys(placedByLane).sort(function(a,b){ return placedByLane[b].length-placedByLane[a].length || a.localeCompare(b); });
  laneKeys.forEach(function(k){
    var placed=placedByLane[k];
    var color = colorFor((placed[0]&&placed[0].ref.lob)||"Other");
    h+='<div class="lane"><div class="lanelabel"><span class="lanename">'+esc(k)+'</span><span class="lanesub">'+placed.length+' project'+(placed.length>1?'s':'')+'</span></div><div class="lanetrack">';
    placed.forEach(function(pl){
      var rawL=pct(pl.start), rawR=pct(pl.end);
      if(rawR<0 || rawL>100) return;            // entirely outside the window
      var L=clip(rawL), R=clip(rawR), W=Math.max(R-L,0.6);
      var resized=(fwdOverrides[pl.ref.code]||0)>0;
      var barColor= pl.pinned ? "#3a5a8a" : (resized ? "#c0433f" : color);
      var clippedL = rawL<0, clippedR = rawR>100;
      var radius = (clippedL?"0":"5px")+" "+(clippedR?"0":"5px")+" "+(clippedR?"0":"5px")+" "+(clippedL?"0":"5px");
      h+='<div class="fbar" data-code="'+esc(pl.ref.code)+'" data-order="'+(pl.ref.order==null?9999:pl.ref.order)+'" style="left:'+L+'%;width:'+W+'%;top:19px;border-radius:'+radius+';'+bar3d(barColor)+'" title="'+esc(pl.ref.name)+' · '+pl.start.toLocaleDateString()+' \u2013 '+pl.end.toLocaleDateString()+(pl.pinned?' · pinned':'')+'">'+(pl.pinned?'\u{1F4CC} ':'')+esc(pl.ref.name)+'<span class="grip" data-grip="'+esc(pl.ref.code)+'"></span></div>';
    });
    h+='</div></div>';
  });
  h+='</div>';

  if(model.missing.length){
    h+='<div class="banner sans" style="margin-top:14px;">'+model.missing.length+' active project'+(model.missing.length>1?'s':'')+' not shown \u2014 no Resource Management schedule yet: <span style="color:#8a7020;">'+model.missing.map(esc).join(', ')+'</span></div>';
  }
  h+='<div id="impactMount"></div>';
  return h;
}

function computeImpact(code, addedDays, pinStart){
  var model=buildFwd();
  var laneKeyFn = function(it){return it.pod||"Other";};
  var before=cascade(model.items, laneKeyFn);
  // apply the trial change, diff, then restore
  var savedOv=fwdOverrides[code], savedPin=fwdPins[code];
  if(pinStart){ fwdPins[code]=new Date(+pinStart); }
  else { fwdOverrides[code]=Math.max((fwdOverrides[code]||0)+addedDays,0); }
  var after=cascade(model.items, laneKeyFn);
  if(savedOv==null) delete fwdOverrides[code]; else fwdOverrides[code]=savedOv;
  if(savedPin==null) delete fwdPins[code]; else fwdPins[code]=savedPin;

  var dragged=null, laneOf=null, draggedAfter=null;
  Object.keys(after).forEach(function(k){ after[k].forEach(function(pl){ if(pl.ref.code===code){ dragged=pl.ref; laneOf=k; draggedAfter=pl; } }); });
  if(!dragged) return null;

  var today=new Date(); today.setHours(0,0,0,0);
  var beforeMap={}; (before[laneOf]||[]).forEach(function(pl){ beforeMap[pl.ref.code]=pl; });
  var afterMap={};  (after[laneOf]||[]).forEach(function(pl){ afterMap[pl.ref.code]=pl; });

  var affected=[];
  (after[laneOf]||[]).forEach(function(pl){
    if(pl.ref.code===code) return;
    var b=beforeMap[pl.ref.code]; if(!b) return;
    var shift=Math.round((pl.start-b.start)/86400000);
    if(shift<=0) return;
    var weeksOut=Math.round((pl.start-today)/(7*86400000));
    var sev, note;
    if(pl.start<=today){ sev="red"; note="should be underway now, still waiting"; }
    else if(weeksOut>=12){ sev="red"; note="now can\u2019t start for ~"+weeksOut+" weeks ("+pl.start.toLocaleDateString(undefined,{month:'short',year:'2-digit'})+")"; }
    else { sev="amber"; note="pushed ~"+shift+" days, starts "+pl.start.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
    affected.push({ name:pl.ref.name, sev:sev, note:note, person:(pl.ref.people||[])[0]||null });
  });

  // overlap / impossibility check for a MOVE-earlier: does the pinned project now sit
  // before a predecessor in its lane still finishes? (shared-resource conflict)
  var warnings=[];
  if(pinStart && draggedAfter){
    (after[laneOf]||[]).forEach(function(pl){
      if(pl.ref.code===code) return;
      if((pl.ref.order==null?Infinity:pl.ref.order) < (dragged.order==null?Infinity:dragged.order)){
        if(draggedAfter.start < pl.end && draggedAfter.end > pl.start){
          warnings.push(dragged.name+" now overlaps "+pl.ref.name+" — would need a second resource, since "+((dragged.people||[])[0]||"the same person")+" can\u2019t do both at once.");
        }
      }
    });
    if(draggedAfter.start<=today) warnings.push("Pinned start is in the past — clamped to today.");
  }

  var bottleneck=null;
  if(dragged.people&&dragged.people.length){
    var counts={}; affected.forEach(function(a){ if(a.person && dragged.people.indexOf(a.person)>=0) counts[a.person]=(counts[a.person]||0)+1; });
    var best=-1; Object.keys(counts).forEach(function(pn){ if(counts[pn]>best){best=counts[pn];bottleneck=pn;} });
    if(!bottleneck && dragged.people.length) bottleneck=dragged.people[0];
  }
  return { dragged:dragged, addedDays:addedDays, pinStart:pinStart, newStart:(draggedAfter?draggedAfter.start:null), affected:affected, bottleneck:bottleneck, warnings:warnings };
}

function showImpact(imp){
  var mount=document.getElementById('impactMount'); if(!mount) return;
  if(!imp){ mount.innerHTML=""; return; }
  var h='<div class="impact"><button class="close" id="impClose">\u00d7</button>';
  if(imp.pinStart && imp.newStart){
    h+='<h4>Moving '+esc(imp.dragged.name)+' to start '+imp.newStart.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'2-digit'})+'</h4>';
  } else {
    var wk=Math.round(imp.addedDays/7);
    h+='<h4>Extending '+esc(imp.dragged.name)+' by ~'+(wk>0?wk+' week'+(wk>1?'s':''):(imp.addedDays+' days'))+'</h4>';
  }
  if(imp.warnings && imp.warnings.length){
    imp.warnings.forEach(function(w){ h+='<div class="sans" style="font-size:12px;color:#a32d2d;background:#fbe7e6;border-radius:5px;padding:6px 8px;margin-top:8px;">\u26a0 '+esc(w)+'</div>'; });
  }
  if(!imp.affected.length){ h+='<div class="sans" style="font-size:12.5px;color:#3b6d11;margin-top:8px;">Nothing downstream is affected — the queue absorbs it.</div>'; }
  else{
    h+='<div class="sans" style="font-size:12px;color:#6b6656;margin-top:6px;">'+imp.affected.length+' project'+(imp.affected.length>1?'s':'')+' put in jeopardy as of today:</div><ul>';
    imp.affected.forEach(function(a){ var col=a.sev==="red"?"#c0433f":(a.sev==="amber"?"#EF9F27":"#8a8474");
      h+='<li><span class="sev" style="background:'+col+'"></span><span><b>'+esc(a.name)+'</b> — '+esc(a.note)+'</span></li>'; });
    h+='</ul>';
    if(imp.bottleneck){ h+='<div class="sans" style="font-size:12px;color:#4a463c;margin-top:10px;border-top:0.5px solid #e8e1d0;padding-top:8px;"><b>Bottleneck:</b> '+esc(imp.bottleneck)+' is the shared resource driving this.</div>'; }
  }
  h+='</div>';
  mount.innerHTML=h;
}

var dragState=null;
function fwdSpanDays(){
  // days spanned by the currently visible window (so a pixel drag maps to sensible days)
  var zc=zoomConfig();
  if(zc.windowMonths===0){
    var FLOOR=new Date(2026,0,1);
    var model=buildFwd(); var all=[]; model.items.forEach(function(it){ all.push(it.baseStart,it.baseEnd); });
    var maxD=all.length?new Date(Math.max.apply(null,all.map(function(d){return +d;}))):new Date(2026,11,31);
    return Math.max((addMonths(monthFloor(maxD),12)-FLOOR)/86400000,1);
  }
  var s=monthFloor(fwdWinStart||new Date());
  return Math.max((addMonths(s,zc.windowMonths)-s)/86400000,1);
}
document.addEventListener('pointerdown', function(e){
  if(activeTab!=="forward") return;
  var grip=e.target.closest && e.target.closest('.grip');
  var bar =e.target.closest && e.target.closest('.fbar');
  if(!grip && !bar) return;
  e.preventDefault();
  var track=(grip||bar).closest('.lanetrack');
  var barEl=grip?grip.parentElement:bar;
  var code=barEl.getAttribute('data-code');
  var trackW=track.getBoundingClientRect().width;
  var myOrder=parseFloat(barEl.getAttribute('data-order'));
  // collect same-lane bars that come AFTER this one (for live push during a move)
  var neighbors=[];
  Array.prototype.forEach.call(track.querySelectorAll('.fbar'), function(el){
    if(el===barEl) return;
    if(parseFloat(el.getAttribute('data-order')) > myOrder){
      neighbors.push({ el:el, baseLeft:parseFloat(el.style.left), width:parseFloat(el.style.width) });
    }
  });
  barEl.classList.add('dragging');
  dragState={ mode: grip?"resize":"move", code:code, startX:e.clientX,
    trackW:trackW, bar:barEl, track:track, neighbors:neighbors,
    startLeftPct:parseFloat(barEl.style.left), startWidthPct:parseFloat(barEl.style.width) };
});
document.addEventListener('pointermove', function(e){
  if(!dragState) return;
  var dx=e.clientX-dragState.startX;
  var dPct=(dx/dragState.trackW)*100;
  if(dragState.mode==="resize"){
    var newW=Math.max(dragState.startWidthPct+dPct,0.6);
    dragState.bar.style.width=newW+'%';
    // live push neighbors when the resized bar's right edge passes them
    var rightEdge=dragState.startLeftPct+newW;
    pushNeighbors(dragState, rightEdge);
  } else {
    var newLeft=Math.max(dragState.startLeftPct+dPct,0);
    dragState.bar.style.left=newLeft+'%';
    var rightEdge=newLeft+dragState.startWidthPct;
    pushNeighbors(dragState, rightEdge);
  }
});
function pushNeighbors(st, draggedRightPct){
  st.neighbors.forEach(function(n){
    n.el.classList.add('nudged');
    // if the dragged bar's right edge now passes a neighbor's original left, shove it right
    var overlap = draggedRightPct - n.baseLeft;
    if(overlap > 0){ n.el.style.left=(n.baseLeft+overlap+0.4)+'%'; }
    else { n.el.style.left=n.baseLeft+'%'; }
  });
}
document.addEventListener('pointerup', function(e){
  if(!dragState) return;
  dragState.bar.classList.remove('dragging');
  var dx=e.clientX-dragState.startX;
  var spanDays=fwdSpanDays();
  var deltaDays=Math.round((dx/dragState.trackW)*spanDays);
  var mode=dragState.mode, code=dragState.code; dragState=null;

  if(mode==="resize"){
    if(deltaDays===0){ render(); return; }
    var imp=computeImpact(code, deltaDays, null);
    fwdOverrides[code]=Math.max((fwdOverrides[code]||0)+deltaDays,0);
    render(); showImpact(imp);
  } else {
    if(deltaDays===0){ render(); return; }
    var model=buildFwd(); var it=null; model.items.forEach(function(x){ if(x.code===code) it=x; });
    if(!it){ render(); return; }
    var curStart = fwdPins[code] ? fwdPins[code] : it.baseStart;
    var today=new Date(); today.setHours(0,0,0,0);
    var newStart=new Date(+curStart + deltaDays*86400000);
    if(newStart<today) newStart=new Date(+today);
    var imp=computeImpact(code, 0, newStart);
    fwdPins[code]=newStart;
    render(); showImpact(imp);
  }
});

// interactivity via delegation (survives re-render)
document.addEventListener('change', function(e){
  if(e.target && e.target.id==='lob'){ filter=e.target.value; render(); }
  if(e.target && e.target.id==='fwdPod'){ fwdPodFilter=e.target.value; render(); }
});
document.addEventListener('click', function(e){
  var tab=e.target.closest && e.target.closest('.tab');
  if(tab){ activeTab=tab.getAttribute('data-tab'); render(); return; }
  var bar=e.target.closest && e.target.closest('.lobbar');
  if(bar){ var l=bar.getAttribute('data-lob'); collapsed[l]=!collapsed[l]; render(); return; }
  if(e.target && e.target.id==='fwdModeBtn'){ fwdMode = fwdMode==="pod"?"person":"pod"; render(); return; }
  var zb=e.target.closest && e.target.closest('.zoombtn');
  if(zb){ zoom=zb.getAttribute('data-zoom'); fwdWinStart=null; render(); return; }
  if(e.target && e.target.id==='fwdPrev'){ var z=zoomConfig(); fwdWinStart=addMonths(monthFloor(fwdWinStart||new Date()), -z.pageMonths); render(); return; }
  if(e.target && e.target.id==='fwdNext'){ var z2=zoomConfig(); fwdWinStart=addMonths(monthFloor(fwdWinStart||new Date()), z2.pageMonths); render(); return; }
  if(e.target && e.target.id==='fwdNow'){ fwdWinStart=null; render(); return; }
  if(e.target && e.target.id==='fwdReset'){ fwdOverrides={}; fwdPins={}; render(); return; }
  if(e.target && e.target.id==='impClose'){ var m=document.getElementById('impactMount'); if(m) m.innerHTML=""; return; }
});

render();
</script>
</body>
</html>
